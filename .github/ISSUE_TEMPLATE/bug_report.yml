name: Bug Report
description: Report a problem with XdTd
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: XdTd Version
      description: Found in Help > About
      placeholder: "e.g., 1.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 10
        - Windows 11
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Other Linux (specify below)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Open...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Error Messages
      description: If applicable, add screenshots or paste error messages.
    validations:
      required: false

  - type: textarea
    id: logfile
    attributes:
      label: Log File
      description: |
        Attach the XdTd log file to help us diagnose the issue.
        The log file is located at:
        - **Windows:** C:\Users\<your-username>\XdTd\_working\_execution.log
        - **Linux:** ~/XdTd/_working/_execution.log

        Drag and drop the file here, or paste the relevant log entries.
      render: text
    validations:
      required: false
